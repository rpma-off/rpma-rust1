name: CI

on:
  pull_request:
  push:
    branches: [develop]

env:
  NODE_VERSION: 20
  PKG_CONFIG_PATH: /usr/lib/pkgconfig:/usr/share/pkgconfig

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Frontend tests
        working-directory: frontend
        run: npm run test:ci

      # Rust
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libgtk-3-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Verify the type-export binary compiles with its feature flag.
      # This catches import path regressions in export-types.rs before they
      # silently break `npm run types:sync` and the downstream build.
      - name: Check type-export binary
        working-directory: src-tauri
        run: cargo check --features export-types --bin export-types

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test